name: Canary Build

on:
  push:
    branches: [master]
    paths:
      - 'source/**'
      - 'include/**'
      - 'library/**'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'scripts/**'
      - 'resources/**'
      - 'apps/**'

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Stamp canary version
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          MAJOR=$(grep 'set(VERSION_MAJOR' CMakeLists.txt | sed 's/.*"\(.*\)".*/\1/')
          MINOR=$(grep 'set(VERSION_MINOR' CMakeLists.txt | sed 's/.*"\(.*\)".*/\1/')
          sed -i "s/set(VERSION_REVISION \".*\")/set(VERSION_REVISION \"canary-${SHORT_SHA}\")/" CMakeLists.txt
          sed -i "s/text=\"Akira v[^\"]*\"/text=\"Akira v${MAJOR}.${MINOR}-canary-${SHORT_SHA}\"/" resources/xml/tabs/settings.xml

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Akira
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            ghcr.io/${{ github.repository_owner }}/akira-builder:latest \
            bash -c "
              set -e
              git config --global --add safe.directory /build
              git config --global --add safe.directory /build/library/borealis
              git config --global --add safe.directory /build/library/chiaki-ng
              git config --global --add safe.directory /build/library/curl-libnx
              chmod +x /build/scripts/build-docker.sh
              /build/scripts/build-docker.sh
            "

      - name: Upload NRO artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: akira-nro-canary-${{ steps.sha.outputs.short }}
          path: build/akira.nro

      - name: Upload ELF artifact (debug symbols)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: akira-elf-canary-${{ steps.sha.outputs.short }}
          path: build/akira.elf

  build-companion:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: akira-companion-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: akira-companion-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: akira-companion-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/akira-companion/go.sum

      - name: Build companion app
        working-directory: apps/akira-companion
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}-canary
          path: apps/akira-companion/${{ matrix.artifact }}

  release:
    needs: [build, build-companion]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Package NRO for SD card
        run: |
          mkdir -p switch
          cp akira.nro switch/akira.nro
          zip -r akira-canary.zip switch/

      - name: Update canary release
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae # v2
        with:
          tag_name: canary
          name: "Canary Build"
          files: |
            akira-canary.zip
            akira.nro
            akira.elf
            akira-companion-*
          prerelease: true
          body: "Latest canary build from `master` — ${{ github.sha }}"

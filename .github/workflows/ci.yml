name: CI

on:
  pull_request:
    branches: [master]

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Stamp PR version
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          PR_NUM=${{ github.event.pull_request.number }}
          MAJOR=$(grep 'set(VERSION_MAJOR' CMakeLists.txt | sed 's/.*"\(.*\)".*/\1/')
          MINOR=$(grep 'set(VERSION_MINOR' CMakeLists.txt | sed 's/.*"\(.*\)".*/\1/')
          sed -i "s/set(VERSION_REVISION \".*\")/set(VERSION_REVISION \"pr${PR_NUM}-${SHORT_SHA}\")/" CMakeLists.txt
          sed -i "s/text=\"Akira v[^\"]*\"/text=\"Akira v${MAJOR}.${MINOR}-pr${PR_NUM}-${SHORT_SHA}\"/" resources/xml/tabs/settings.xml

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Akira
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            ghcr.io/${{ github.repository_owner }}/akira-builder:latest \
            bash -c "
              set -e
              git config --global --add safe.directory /build
              git config --global --add safe.directory /build/library/borealis
              git config --global --add safe.directory /build/library/chiaki-ng
              git config --global --add safe.directory /build/library/curl-libnx
              chmod +x /build/scripts/build-docker.sh
              /build/scripts/build-docker.sh
            "

      - name: Upload NRO artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: akira-nro-${{ steps.sha.outputs.short }}
          path: build/akira.nro

      - name: Upload ELF artifact (debug symbols)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: akira-elf-${{ steps.sha.outputs.short }}
          path: build/akira.elf

  build-companion:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: akira-companion-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: akira-companion-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: akira-companion-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/akira-companion/go.sum

      - name: Build companion app
        working-directory: apps/akira-companion
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} .

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}-${{ steps.sha.outputs.short }}
          path: apps/akira-companion/${{ matrix.artifact }}

  comment:
    needs: [build, build-companion]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Post artifact links to PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `### Build artifacts`,
              ``,
              `Build succeeded for \`${sha}\`. Download artifacts from the [workflow run](${runUrl}).`,
              ``,
              `| Artifact | Description |`,
              `|----------|-------------|`,
              `| \`akira-nro-${sha}\` | NRO for Switch |`,
              `| \`akira-elf-${sha}\` | ELF with debug symbols |`,
              `| \`akira-companion-linux-amd64-${sha}\` | Companion (Linux) |`,
              `| \`akira-companion-darwin-arm64-${sha}\` | Companion (macOS) |`,
              `| \`akira-companion-windows-amd64.exe-${sha}\` | Companion (Windows) |`,
            ].join('\n');

            // Find existing bot comment to update instead of spamming
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Build artifacts')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
